name: Build Windows EXEs

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        component:
          - name: server
            folder: server
            entry: server.py
            extra: "--paths agents --paths gateway --hidden-import names --hidden-import agent --hidden-import manager --hidden-import prompts --hidden-import tools --hidden-import gateway --hidden-import handlers --hidden-import database --hidden-import keys"
          - name: admin-client
            folder: admin-client
            entry: client.py
            extra: "--collect-all nicegui --hidden-import transport"
          - name: agent-client
            folder: agent-client
            entry: client.py
            extra: "--hidden-import transport"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: ${{ matrix.component.folder }}
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build EXE
        working-directory: ${{ matrix.component.folder }}
        run: |
          pyinstaller --onefile --paths .. --name ${{ matrix.component.name }} ${{ matrix.component.extra }} ${{ matrix.component.entry }}

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component.name }}-windows-exe
          path: ${{ matrix.component.folder }}/dist/*.exe
