<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harmony</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="viewport">
      <section class="hero-card">
        <div class="hero-bg" aria-hidden="true"></div>
        <a
          class="github-btn"
          href="https://github.com/danielreiman/Harmony"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
          ><svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <path
              d="M8 0C3.58 0 0 3.67 0 8.2c0 3.63 2.29 6.7 5.47 7.79.4.08.55-.18.55-.39 0-.19-.01-.82-.01-1.48-2.01.38-2.53-.5-2.69-.96-.09-.24-.48-.96-.82-1.16-.28-.15-.68-.53-.01-.54.63-.01 1.08.59 1.23.84.72 1.24 1.87.89 2.33.68.07-.54.28-.89.51-1.09-1.78-.21-3.64-.92-3.64-4.1 0-.9.31-1.64.82-2.22-.08-.21-.36-1.05.08-2.18 0 0 .67-.22 2.2.85.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.07 2.2-.85 2.2-.85.44 1.13.16 1.97.08 2.18.51.58.82 1.31.82 2.22 0 3.19-1.87 3.89-3.65 4.1.29.26.54.75.54 1.52 0 1.09-.01 1.97-.01 2.25 0 .21.14.47.55.39A8.22 8.22 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"
            ></path>
          </svg></a
        >

        <div class="hero-content">
          <img class="hero-icon" src="icon.png" alt="Harmony icon" />
          <h1>Harmony</h1>
          <p>
            Harmony brings together computer using agents to act independently while moving toward a
            common purpose.
          </p>

          <div class="actions">
            <div class="install-picker" data-install-picker>
              <button
                id="install-toggle"
                class="install-toggle"
                type="button"
                aria-haspopup="true"
                aria-expanded="false"
              >
                <span class="install-toggle-content">
                  <span class="install-toggle-text">Install Now</span>
                  <span class="install-caret-wrap" aria-hidden="true">
                    <span class="install-caret"></span>
                  </span>
                </span>
              </button>
              <div class="install-menu" id="install-menu" role="listbox" aria-label="Install version">
                <button
                  type="button"
                  class="install-option is-selected"
                  role="option"
                  data-branch="main"
                  aria-selected="true"
                >
                  <span class="install-option-icon" data-lucide="shield-check" aria-hidden="true"></span>
                  <span class="install-option-label">Install Stable (main)</span>
                  <span class="install-option-capsule">DOWNLOAD</span>
                </button>
                <button
                  type="button"
                  class="install-option"
                  role="option"
                  data-branch="in-development"
                  aria-selected="false"
                >
                  <span class="install-option-icon" data-lucide="flask-conical" aria-hidden="true"></span>
                  <span class="install-option-label">Install In Development</span>
                  <span class="install-option-capsule">DOWNLOAD</span>
                </button>
              </div>
            </div>
            <button type="button" id="instructions-btn" class="btn btn-secondary">Download Instructions Book</button>
          </div>
        </div>
        <div class="custom-alert" id="custom-alert" role="status" aria-live="polite" hidden>
          <span class="custom-alert-icon" data-lucide="clock-3" aria-hidden="true"></span>
          <p class="custom-alert-message">Instructions book is coming soon.</p>
          <button type="button" class="custom-alert-close" id="custom-alert-close" aria-label="Close alert">
            <span data-lucide="x" aria-hidden="true"></span>
          </button>
        </div>
        <footer class="site-footer">
          <p>&copy; 2026 Daniel Reiman. All rights reserved.</p>
        </footer>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="script.js"></script>
  </body>
</html>
